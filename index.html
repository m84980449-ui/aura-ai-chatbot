<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura AI — Premium SaaS Chatbot Client UI Boilerplate</title>
  <!-- Outfit & JetBrains Mono Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05070f;
      --sidebar: rgba(10, 14, 28, 0.6);
      --chat-area: rgba(15, 23, 42, 0.3);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.15);
      --accent2: #ec4899;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --panel: rgba(20, 27, 45, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 0% 0%, var(--accent-glow) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      backdrop-filter: blur(20px);
      z-index: 10;
    }

    .brand {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(95deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      background: var(--accent2);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent2);
    }

    .new-chat-btn {
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: #fff;
      border: none;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
    }
    .new-chat-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .menu-item:hover, .menu-item.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--border);
    }

    .user-profile {
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }
    .username { font-weight: 600; font-size: 0.85rem; }
    .tier { font-size: 0.7rem; color: var(--accent2); font-weight: 700; text-transform: uppercase; }

    /* Chat Area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-area);
      backdrop-filter: blur(10px);
      position: relative;
    }

    .chat-header {
      height: 70px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

    .model-selector {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .message {
      max-width: 75%;
      display: flex;
      gap: 1rem;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-bubble {
      padding: 1rem 1.25rem;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .message.user .msg-bubble {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.25);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .msg-bubble {
      background: var(--panel);
      border: 1px solid var(--border);
      color: #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    /* Input Box */
    .chat-input-wrapper {
      padding: 2rem;
      border-top: 1px solid var(--border);
    }

    .chat-input-box {
      max-width: 800px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: border-color 0.2s;
    }
    .chat-input-box:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      height: 24px;
      padding-top: 2px;
    }

    .send-btn {
      background: var(--accent);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-weight: bold;
      transition: background 0.2s;
    }
    .send-btn:hover {
      background: #7c3aed;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-dot"></div>
      Aura AI
    </div>
    
    <button class="new-chat-btn" onclick="clearChat()">+ New Chat</button>
    
    <nav class="menu-list">
      <a href="#" class="menu-item active">💬 Chat Workspace</a>
      <a href="#" class="menu-item">📚 Prompt Library</a>
      <a href="#" class="menu-item">📈 Usage Analytics</a>
      <a href="#" class="menu-item">⚙️ Settings</a>
    </nav>
    
    <div class="user-profile">
      <div class="avatar">U</div>
      <div class="user-info">
        <span class="username">Guest Creator</span>
        <span class="tier">Pro Account</span>
      </div>
    </div>
  </aside>

  <!-- Main Chat Interface -->
  <main class="chat-container">
    <header class="chat-header">
      <div style="font-weight: 600;">✨ Chat Engine</div>
      <select class="model-selector">
        <option>aura-v2-turbo (Default)</option>
        <option>aura-v2-ultra</option>
      </select>
    </header>
    
    <!-- Chat Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="message assistant">
        <div class="avatar" style="background: linear-gradient(135deg, var(--accent2), var(--accent));">AI</div>
        <div class="msg-bubble">
          Hello! I am Aura, your premium AI assistant wrapper. Ask me anything, or type a message below to see a live streaming reply simulation!
        </div>
      </div>
    </div>
    
    <!-- Input Panel -->
    <div class="chat-input-wrapper">
      <div class="chat-input-box">
        <textarea id="chat-input" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➔</button>
      </div>
    </div>
  </main>

  <script>
    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('chat-input');

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      // Append User Message
      appendMessage(text, 'user');
      inputEl.value = '';

      // Auto scroll
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Simulate Streaming AI response
      setTimeout(() => {
        simulateAIResponse(text);
      }, 800);
    }

    function appendMessage(text, sender) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      
      const avatarHtml = sender === 'user' 
        ? `<div class="avatar">U</div>`
        : `<div class="avatar" style="background: linear-gradient(135deg, var(--accent2), var(--accent));">AI</div>`;

      msg.innerHTML = `
        ${avatarHtml}
        <div class="msg-bubble">${text}</div>
      `;
      
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return msg;
    }

    function simulateAIResponse(userText) {
      // Custom simulated answers based on user inputs
      const responses = [
        "That is an excellent question! As a premium Aura AI boilerplate, you can easily connect my interface to the OpenAI, Anthropic, or Gemini API by updating the fetch() handler inside the script block.",
        "To customize my appearance, you can adjust the CSS variables located in the root style block. Everything is styled with ultra-clean, highly performance-optimized CSS.",
        "Indeed! Front-end wrappers like this are in extremely high demand on marketplaces like Gumroad or Whop, because developers want beautiful pre-designed client side interfaces for their private API backends.",
        "Feel free to ask another question or test the responsive design by resizing your window!"
      ];
      
      const answer = responses[Math.floor(Math.random() * responses.length)];
      
      // Append assistant empty message block
      const msg = appendMessage('', 'assistant');
      const bubble = msg.querySelector('.msg-bubble');
      
      // Simulate typing streaming text letter by letter
      let i = 0;
      function type() {
        if (i < answer.length) {
          bubble.innerHTML += answer.charAt(i);
          i++;
          messagesEl.scrollTop = messagesEl.scrollHeight;
          setTimeout(type, 18);
        }
      }
      type();
    }

    function clearChat() {
      messagesEl.innerHTML = `
        <div class="message assistant">
          <div class="avatar" style="background: linear-gradient(135deg, var(--accent2), var(--accent));">AI</div>
          <div class="msg-bubble">
            Chat cleared. Starting a new clean session. Ask me anything!
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
